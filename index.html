<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Fautes & Analyse</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f7fb;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .block {
            margin-bottom: 25px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%;
            height: 140px;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-generate { background-color: #e74c3c; }
        .btn-generate:hover { background-color: #c0392b; }
        .btn-show-correction { background-color: #3498db; width: 100%; }
        .btn-show-correction:hover { background-color: #2980b9; }
        
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .text-display {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            background-color: #f8f9fa;
            border: 2px dashed #e74c3c;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            white-space: pre-wrap;
        }
        label {
            font-weight: bold;
            color: #34495e;
            display: block;
            margin-bottom: 8px;
        }
        .status {
            font-style: italic;
            color: #7f8c8d;
            text-align: center;
            margin-top: 5px;
        }
        .hidden { display: none; }
        
        /* Styles de l'analyse comparative */
        .word-list {
            list-style-type: none;
            padding: 0;
            margin-top: 15px;
        }
        .word-list li {
            background: #fdf2f2;
            border-left: 5px solid #e74c3c;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 0 4px 4px 0;
            font-size: 15px;
        }
        .correct-word {
            color: #27ae60;
            font-weight: bold;
        }
        .wrong-word {
            color: #c0392b;
            font-weight: bold;
            text-decoration: line-through;
        }
    </style>
</head>
<body>

    <h1>Générateur de Fautes & Correction Automatique</h1>
    <p class="subtitle">Colle un texte propre : l'IA génère les fautes et cache la correction jusqu'à ton clic.</p>

    <!-- ÉTAPE 1 : Saisie initiale -->
    <div class="block">
        <label for="inputText">1. Colle ton texte d'origine (Sans fautes) :</label>
        <textarea id="inputText" placeholder="Colle ton texte impeccable ici..."></textarea>
        <button id="submitBtn" class="btn-generate">Générer les fautes avec l'IA</button>
        <div id="statusMessage" class="status"></div>
    </div>

    <!-- ÉTAPE 2 : Rendu du texte avec fautes -->
    <div id="resultZone" class="hidden">
        <div class="block">
            <label>2. Texte avec fautes (Généré par Mistral AI) :</label>
            <div id="outputText" class="text-display"></div>
            <button id="showCorrectionBtn" class="btn-show-correction">Voir le corrigé</button>
        </div>
    </div>

    <!-- ÉTAPE 3 : Analyse comparative masquée -->
    <div id="correctionZone" class="hidden block">
        <h2>🔍 Liste des modifications / erreurs introduites :</h2>
        <div id="comparisonDisplay"></div>
    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const submitBtn = document.getElementById('submitBtn');
        const showCorrectionBtn = document.getElementById('showCorrectionBtn');
        const statusMessage = document.getElementById('statusMessage');
        
        const resultZone = document.getElementById('resultZone');
        const correctionZone = document.getElementById('correctionZone');
        const comparisonDisplay = document.getElementById('comparisonDisplay');

        let texteOriginalGlobal = "";
        let texteModifieGlobal = "";

        // Fonction de nettoyage des mots
        function nettoyerEtDecouper(texte) {
            return texte
                .toLowerCase()
                .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"«»']/g, " ")
                .split(/\s+/)
                .filter(mot => mot.length > 0);
        }

        // Étape 1 : Appel à l'IA
        submitBtn.addEventListener('click', async () => {
            const textToTransform = inputText.value.trim();
            if (!textToTransform) return alert("Veuillez ajouter du texte.");

            submitBtn.disabled = true;
            statusMessage.innerText = "L'IA sabote le texte...";
            resultZone.classList.add('hidden');
            correctionZone.classList.add('hidden');

            try {
                const response = await fetch('/api/transform', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textToTransform })
                });

                if (!response.ok) throw new Error(`Erreur serveur (${response.status})`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                // Sauvegarde pour l'analyse
                texteOriginalGlobal = textToTransform;
                texteModifieGlobal = data.result;

                // Affichage du texte modifié uniquement
                outputText.innerText = texteModifieGlobal;
                resultZone.classList.remove('hidden');
                statusMessage.innerText = "Texte généré !";
                resultZone.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                statusMessage.innerText = `Erreur : ${error.message}`;
            } finally {
                submitBtn.disabled = false;
            }
        });

        // Étape 2 : Clic sur "Voir le corrigé"
        showCorrectionBtn.addEventListener('click', () => {
            genererComparaison(texteOriginalGlobal, texteModifieGlobal);
            correctionZone.classList.remove('hidden');
            correctionZone.scrollIntoView({ behavior: 'smooth' });
        });

        function genererComparaison(original, modifie) {
            const motsCorrects = nettoyerEtDecouper(original);
            const motsErrones = nettoyerEtDecouper(modifie);

            let erreurs = [];
            const longueurMax = Math.max(motsCorrects.length, motsErrones.length);
            
            for (let i = 0; i < longueurMax; i++) {
                const motAttendu = motsCorrects[i] || "(supprimé)";
                const motRecu = motsErrones[i] || "(ajouté)";
                
                if (motAttendu !== motRecu) {
                    erreurs.push({
                        index: i + 1,
                        attendu: motAttendu,
                        recu: motRecu
                    });
                }
            }

            // Génération du rendu HTML[cite: 1]
            if (erreurs.length === 0) {
                comparisonDisplay.innerHTML = '<p style="color: #27ae60; font-weight: bold;">⚠️ L\'IA n\'a introduit aucune faute.</p>';
            } else {
                let htmlResultat = `<p>L'IA a modifié <strong>${erreurs.length}</strong> mot(s) :</p>`;
                htmlResultat += '<ul class="word-list">';
                
                erreurs.forEach(erreur => {
                    htmlResultat += `
                        <li>
                            <strong>Mot n°${erreur.index} :</strong> 
                            L'IA a écrit <span class="wrong-word">"${erreur.recu}"</span> 
                            au lieu de la référence <span class="correct-word">"${erreur.attendu}"</span>
                        </li>`;
                });
                
                htmlResultat += '</ul>';
                comparisonDisplay.innerHTML = htmlResultat;
            }
        }
    </script>
</body>
</html>
