<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Révision Française - Correcteur Intelligent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #4a7ba7 0%, #2c5aa0 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 1.05em;
            opacity: 0.95;
            font-weight: 300;
        }

        .content {
            padding: 40px 30px;
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            min-width: 200px;
            padding: 15px 20px;
            border: 2px solid #d0d8e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s;
            color: #2c3e50;
        }

        .mode-btn:hover {
            border-color: #4a7ba7;
            box-shadow: 0 4px 15px rgba(74, 123, 167, 0.2);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #4a7ba7 0%, #2c5aa0 100%);
            color: white;
            border-color: #2c5aa0;
        }

        .section {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .narrative-box, .exercise-box, .correction-box {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            border-left: 5px solid #4a7ba7;
            margin: 20px 0;
            line-height: 1.8;
            font-size: 1.05em;
        }

        .exercise-box {
            border-left-color: #f39c12;
            background: #fef9f3;
        }

        .correction-box {
            border-left-color: #27ae60;
            background: #f0fdf4;
        }

        .word-chip {
            display: inline-block;
            margin: 5px;
            padding: 8px 12px;
            background: white;
            border: 2px solid #d0d8e0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
            font-weight: 500;
        }

        .word-chip:hover {
            background: #e8f0f7;
            border-color: #4a7ba7;
            transform: scale(1.05);
        }

        .word-chip.selected {
            background: #4a7ba7;
            color: white;
            border-color: #4a7ba7;
        }

        .correction-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .correction-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #d0d8e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .correction-input input:focus {
            outline: none;
            border-color: #4a7ba7;
            box-shadow: 0 0 0 3px rgba(74, 123, 167, 0.1);
        }

        .correction-input button {
            padding: 12px 24px;
            background: #4a7ba7;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .correction-input button:hover {
            background: #2c5aa0;
            transform: translateY(-2px);
        }

        .correction-word {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin: 8px 0;
            border-left: 4px solid #e74c3c;
        }

        .correction-word.correct {
            border-left-color: #27ae60;
            background: #f0fdf4;
        }

        .original {
            font-weight: 600;
            color: #e74c3c;
            min-width: 100px;
        }

        .original.correct {
            color: #27ae60;
        }

        .arrow {
            color: #95a5a6;
            font-weight: bold;
        }

        .arrow.correct {
            color: #27ae60;
        }

        .corrected {
            flex: 1;
        }

        .user-answer {
            background: #f0f4f8;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: 500;
            color: #2c3e50;
        }

        .grade-card {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin: 25px 0;
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.3);
        }

        .grade-card.fail {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.3);
        }

        .grade-card h3 {
            font-size: 1.2em;
            margin-bottom: 10px;
            font-weight: 500;
            opacity: 0.9;
        }

        .grade-number {
            font-size: 3.5em;
            font-weight: 700;
            margin: 10px 0;
            letter-spacing: -2px;
        }

        .grade-message {
            font-size: 1.1em;
            margin-top: 15px;
            opacity: 0.95;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #4a7ba7;
            color: white;
        }

        .btn-primary:hover {
            background: #2c5aa0;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .btn-secondary:hover {
            background: #d5dbdc;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #7f8c8d;
        }

        .spinner {
            border: 4px solid #ecf0f1;
            border-top: 4px solid #4a7ba7;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fadbd8;
            color: #c0392b;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c0392b;
            margin: 15px 0;
        }

        .success {
            background: #d5f4e6;
            color: #27ae60;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #27ae60;
            margin: 15px 0;
        }

        .problem-display {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            border-left: 5px solid #f39c12;
            margin: 20px 0;
            font-size: 1.1em;
            line-height: 1.8;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: 2px solid #d0d8e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .answer-input:focus {
            outline: none;
            border-color: #4a7ba7;
            box-shadow: 0 0 0 3px rgba(74, 123, 167, 0.1);
        }

        .info-banner {
            background: #e8f4f8;
            border-left: 4px solid #3498db;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #2c5aa0;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.6em;
            }

            .content {
                padding: 25px 20px;
            }

            .narrative-box, .exercise-box, .correction-box, .problem-display {
                padding: 15px;
            }

            .grade-number {
                font-size: 2.5em;
            }

            .mode-btn {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Révision Française</h1>
            <p>Exercices interactifs de correction et calcul CM2+</p>
        </header>

        <div class="content" id="content">
            <div class="info-banner">
                ℹ️ <strong>Clé API sécurisée:</strong> Votre clé Mistral est stockée en variable d'environnement Netlify
            </div>

            <div class="mode-selector">
                <button class="mode-btn active" onclick="switchMode('reading')">📖 Lecture & Correction</button>
                <button class="mode-btn" onclick="switchMode('math')">🔢 Problèmes CM2</button>
            </div>

            <!-- Mode Lecture et Correction -->
            <div id="reading" class="section active">
                <div style="text-align: center; margin-bottom: 30px;">
                    <button class="btn btn-primary" onclick="generateNarrative()">Générer un texte</button>
                </div>

                <div id="readingContent"></div>
            </div>

            <!-- Mode Problèmes Mathématiques -->
            <div id="math" class="section">
                <div style="text-align: center; margin-bottom: 30px;">
                    <button class="btn btn-primary" onclick="generateProblem()">Générer un problème</button>
                </div>

                <div id="mathContent"></div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'narrative';
        let currentNarrative = '';
        let currentExercise = '';
        let exerciseCorrections = {};
        let currentProblem = '';
        let currentAnswer = '';

        // Appel à la fonction Netlify (au lieu d'appeler directement Mistral)
        async function callMistral(prompt) {
            try {
                const response = await fetch('/.netlify/functions/mistral', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Erreur API');
                }

                const data = await response.json();
                return data.result;
            } catch (err) {
                showError('Erreur: ' + err.message);
                return null;
            }
        }

        // Générer un texte narratif
        async function generateNarrative() {
            const content = document.getElementById('readingContent');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Génération d\'un texte...</p></div>';

            const prompt = `Génère un court texte narratif en français (150-200 mots) sur un sujet intéressant pour un enfant (école, amitié, aventure, nature, etc.). 
            Le texte doit être grammaticalement correct et bien écrit. 
            Retourne UNIQUEMENT le texte, pas d'explications.`;

            const narrative = await callMistral(prompt);
            if (!narrative) return;

            currentNarrative = narrative;
            currentMode = 'narrative';

            content.innerHTML = `
                <h3 style="margin-bottom: 20px; color: #2c3e50;">📖 Texte à lire</h3>
                <div class="narrative-box">${escapeHtml(narrative)}</div>
                <div class="controls">
                    <button class="btn btn-primary" onclick="switchToExercise()">📝 Passer à l'exercice</button>
                    <button class="btn btn-secondary" onclick="generateNarrative()">Générer un autre</button>
                </div>
            `;
        }

        // Générer et afficher l'exercice
        async function switchToExercise() {
            if (!currentNarrative) {
                showError('Générez d\'abord un texte');
                return;
            }

            const content = document.getElementById('readingContent');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Préparation de l\'exercice...</p></div>';

            const prompt = `Tu es un professeur de français. Voici un texte:

"${currentNarrative}"

INSTRUCTIONS:
1. Identifie les mots/accords clés du texte (5-8 mots ou expressions)
2. Introduis intentionnellement des FAUTES dans ces mots:
   - Fautes d'orthographe
   - Fautes d'accord (genre, nombre)
   - Fautes de conjugaison
   - Fautes de grammaire

3. Retourne le résultat UNIQUEMENT sous ce format JSON (strictement):
{
  "modified_text": "le texte avec fautes",
  "corrections": {
    "mot_incorrect_1": "correction1",
    "mot_incorrect_2": "correction2"
  }
}

Assure-toi que les fautes sont clairement visibles et corrigeables.`;

            const result = await callMistral(prompt);
            if (!result) return;

            try {
                const data = JSON.parse(result);
                currentExercise = data.modified_text;
                exerciseCorrections = data.corrections;

                displayExercise();
            } catch (err) {
                showError('Erreur en analysant la réponse. Réessayez.');
            }
        }

        // Afficher l'exercice
        function displayExercise() {
            const content = document.getElementById('readingContent');
            const errorCount = Object.keys(exerciseCorrections).length;

            content.innerHTML = `
                <h3 style="margin-bottom: 20px; color: #2c3e50;">✏️ Exercice: Trouvez et corrigez les erreurs</h3>
                <div class="exercise-box">${escapeHtml(currentExercise)}</div>
                
                <div style="background: #fef5e7; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #f39c12;">
                    <p><strong>📌 Nombre d'erreurs:</strong> ${errorCount}</p>
                    <p style="font-size: 0.95em; margin-top: 8px; color: #7f8c8d;">Cliquez sur les mots qui vous semblent faux et proposez une correction</p>
                </div>

                <div id="wordList" style="margin: 25px 0;"></div>

                <div class="controls">
                    <button class="btn btn-primary" onclick="checkAnswers()">Vérifier les réponses</button>
                    <button class="btn btn-secondary" onclick="switchToExercise()">Nouvel exercice</button>
                </div>
            `;

            displayWords();
        }

        // Afficher les mots pour correction
        function displayWords() {
            const wordList = document.getElementById('wordList');
            const words = Object.keys(exerciseCorrections);

            let html = '<h4 style="margin-bottom: 15px; color: #2c3e50;">Mots à corriger:</h4>';
            html += '<div style="display: flex; flex-wrap: wrap; gap: 10px;">';

            words.forEach((word, index) => {
                html += `
                    <div class="word-chip" id="word${index}" onclick="selectWord(${index}, '${word.replace(/'/g, "\\'")}')">
                        ${escapeHtml(word)}
                    </div>
                `;
            });

            html += '</div>';
            html += '<div id="correctionPanel" style="margin-top: 25px;"></div>';

            wordList.innerHTML = html;
        }

        // Sélectionner un mot à corriger
        function selectWord(index, word) {
            document.querySelectorAll('.word-chip').forEach(chip => chip.classList.remove('selected'));
            document.getElementById('word' + index).classList.add('selected');

            const panel = document.getElementById('correctionPanel');
            const correction = exerciseCorrections[word];

            panel.innerHTML = `
                <div style="background: #f0f4f8; padding: 20px; border-radius: 8px;">
                    <p style="margin-bottom: 10px;">
                        <strong>Mot incorrect:</strong> <span style="color: #e74c3c; font-family: monospace; font-size: 1.1em;">${escapeHtml(word)}</span>
                    </p>
                    <p style="margin-bottom: 15px;"><strong>Votre proposition:</strong></p>
                    <div class="correction-input">
                        <input type="text" id="userAnswer" placeholder="Entrez la correction..." />
                        <button onclick="submitCorrection('${word.replace(/'/g, "\\'")}')">Valider</button>
                    </div>
                    <div id="feedback"></div>
                </div>
            `;

            document.getElementById('userAnswer').focus();
        }

        // Soumettre une correction
        function submitCorrection(word) {
            const userAnswer = document.getElementById('userAnswer').value.trim();
            const feedback = document.getElementById('feedback');
            const correction = exerciseCorrections[word];

            if (!userAnswer) {
                feedback.innerHTML = '<p style="color: #e74c3c;">Veuillez entrer une correction</p>';
                return;
            }

            // Simple comparaison (case-insensitive)
            if (userAnswer.toLowerCase() === correction.toLowerCase()) {
                feedback.innerHTML = `
                    <div class="success">
                        ✅ Correct! La bonne réponse est: <strong>${escapeHtml(correction)}</strong>
                    </div>
                `;
                exerciseCorrections[word] = { answer: userAnswer, correct: true };
            } else {
                feedback.innerHTML = `
                    <div class="error">
                        ❌ Incorrect. La bonne réponse est: <strong>${escapeHtml(correction)}</strong>
                    </div>
                `;
                exerciseCorrections[word] = { answer: userAnswer, correct: false };
            }
        }

        // Vérifier toutes les réponses et afficher la note
        function checkAnswers() {
            let correct = 0;
            let total = Object.keys(exerciseCorrections).length;

            Object.values(exerciseCorrections).forEach(item => {
                if (item.correct === true) correct++;
            });

            const grade = Math.round((correct / total) * 10);
            const percentage = Math.round((correct / total) * 100);

            const content = document.getElementById('readingContent');
            let message = '';

            if (grade >= 8) message = '🌟 Excellent travail!';
            else if (grade >= 6) message = '👍 Très bien!';
            else if (grade >= 4) message = '📝 À améliorer';
            else message = '💪 Continuez vos efforts!';

            let html = `
                <h3 style="margin-bottom: 20px; color: #2c3e50;">📊 Résultats</h3>
                <div class="grade-card ${grade < 6 ? 'fail' : ''}">
                    <h3>${message}</h3>
                    <div class="grade-number">${grade}/10</div>
                    <div class="grade-message">${correct}/${total} réponses correctes (${percentage}%)</div>
                </div>

                <div class="correction-box">
                    <h4 style="margin-bottom: 15px;">📋 Corrections détaillées:</h4>
                    <div id="detailedCorrections"></div>
                </div>

                <div class="controls">
                    <button class="btn btn-primary" onclick="generateNarrative()">Nouvel exercice</button>
                    <button class="btn btn-secondary" onclick="switchMode('reading')">Retour</button>
                </div>
            `;

            content.innerHTML = html;

            const detailsDiv = document.getElementById('detailedCorrections');
            let detailsHtml = '';

            Object.entries(exerciseCorrections).forEach(([word, data]) => {
                const isCorrect = data.correct === true;
                detailsHtml += `
                    <div class="correction-word ${isCorrect ? 'correct' : ''}">
                        <span class="original ${isCorrect ? 'correct' : ''}">${escapeHtml(word)}</span>
                        <span class="arrow ${isCorrect ? 'correct' : ''}">→</span>
                        <div class="corrected">
                            <div>Votre réponse: <span class="user-answer">${escapeHtml(data.answer || '—')}</span></div>
                            <div>Correction: <span style="color: #27ae60; font-weight: 600;">${escapeHtml(data.answer || word)}</span></div>
                            ${isCorrect ? '<div style="color: #27ae60; margin-top: 5px;">✅ Correct</div>' : '<div style="color: #e74c3c; margin-top: 5px;">❌ Incorrect</div>'}
                        </div>
                    </div>
                `;
            });

            detailsDiv.innerHTML = detailsHtml;
        }

        // Problèmes Mathématiques CM2
        async function generateProblem() {
            const content = document.getElementById('mathContent');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Génération d\'un problème...</p></div>';

            const prompt = `Génère un problème mathématique de niveau CM2 (classe de 10-11 ans).
            Le problème doit être:
            - Réaliste et contextualisé (école, maison, magasin, etc.)
            - Utiliser des additions, soustractions, multiplications ou divisions
            - Avec des nombres simples (pas plus de 4 chiffres)
            
            Retourne UNIQUEMENT le problème, pas la solution.
            Format: "Un enfant... Combien de..."`;

            const problem = await callMistral(prompt);
            if (!problem) return;

            currentProblem = problem;
            currentMode = 'math';

            content.innerHTML = `
                <h3 style="margin-bottom: 20px; color: #2c3e50;">🔢 Problème à résoudre</h3>
                <div class="problem-display">${escapeHtml(problem)}</div>
                
                <p style="margin: 20px 0; color: #7f8c8d; font-weight: 500;">Résolvez le problème et entrez votre réponse:</p>
                <input type="text" class="answer-input" id="mathAnswer" placeholder="Votre réponse (nombre ou phrase courte)" />
                
                <div class="controls" style="margin-top: 25px;">
                    <button class="btn btn-primary" onclick="submitProblemAnswer()">Vérifier la réponse</button>
                    <button class="btn btn-secondary" onclick="generateProblem()">Autre problème</button>
                </div>

                <div id="mathFeedback"></div>
            `;

            document.getElementById('mathAnswer').focus();
        }

        // Soumettre une réponse de problème
        async function submitProblemAnswer() {
            const userAnswer = document.getElementById('mathAnswer').value.trim();
            if (!userAnswer) {
                showError('Veuillez entrer une réponse');
                return;
            }

            const content = document.getElementById('mathContent');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Vérification de la réponse...</p></div>';

            const prompt = `Problème mathématique CM2:
"${currentProblem}"

Réponse de l'élève: "${userAnswer}"

Évalue si la réponse est correcte ou presque correcte.
Retourne UNIQUEMENT un JSON:
{
  "is_correct": true/false,
  "expected_answer": "la bonne réponse",
  "explanation": "brève explication",
  "grade": 10/8/5/2  (selon la qualité de la réponse)
}`;

            const result = await callMistral(prompt);
            if (!result) return;

            try {
                const feedback = JSON.parse(result);
                displayMathResult(userAnswer, feedback);
            } catch (err) {
                showError('Erreur en analysant la réponse');
            }
        }

        // Afficher le résultat du problème
        function displayMathResult(userAnswer, feedback) {
            const content = document.getElementById('mathContent');
            const grade = feedback.grade || (feedback.is_correct ? 10 : 2);

            let message = '';
            if (grade >= 9) message = '🌟 Parfait!';
            else if (grade >= 8) message = '👍 Très bien!';
            else if (grade >= 6) message = '📝 Presque juste';
            else message = '💪 À revoir';

            const html = `
                <h3 style="margin-bottom: 20px; color: #2c3e50;">📊 Résultat</h3>
                
                <div class="problem-display">
                    <h4 style="margin-bottom: 10px; color: #2c3e50;">Problème:</h4>
                    <p>${escapeHtml(currentProblem)}</p>
                </div>

                <div class="grade-card ${grade < 8 ? 'fail' : ''}">
                    <h3>${message}</h3>
                    <div class="grade-number">${grade}/10</div>
                </div>

                <div class="correction-box">
                    <h4>📋 Explication</h4>
                    <div style="margin: 15px 0;">
                        <p><strong>Votre réponse:</strong> ${escapeHtml(userAnswer)}</p>
                        <p><strong>Bonne réponse:</strong> ${escapeHtml(feedback.expected_answer)}</p>
                        <p style="margin-top: 15px; line-height: 1.6;">${escapeHtml(feedback.explanation)}</p>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-primary" onclick="generateProblem()">Autre problème</button>
                    <button class="btn btn-secondary" onclick="switchMode('math')">Retour</button>
                </div>
            `;

            content.innerHTML = html;
        }

        // Utilitaires
        function switchMode(mode) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(mode).classList.add('active');
            event.target.classList.add('active');

            if (mode === 'reading') {
                document.getElementById('readingContent').innerHTML = '';
            } else if (mode === 'math') {
                document.getElementById('mathContent').innerHTML = '';
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function showError(message) {
            const alert = document.createElement('div');
            alert.className = 'error';
            alert.innerHTML = '⚠️ ' + message;
            document.querySelector('.content').insertBefore(alert, document.querySelector('.content').firstChild);
            setTimeout(() => alert.remove(), 5000);
        }

        function showSuccess(message) {
            const alert = document.createElement('div');
            alert.className = 'success';
            alert.innerHTML = '✅ ' + message;
            document.querySelector('.content').insertBefore(alert, document.querySelector('.content').firstChild);
            setTimeout(() => alert.remove(), 5000);
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🎓 Site de révision prêt! La clé API est sécurisée en variable d\'environnement Netlify.');
        });
    </script>
</body>
</html>
