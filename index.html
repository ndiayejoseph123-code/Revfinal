<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massacreur de Texte Sécurisé</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f7fb;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .container {
            display: block;
        }
        .block {
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-bottom: 25px;
        }
        button:hover {
            background-color: #c0392b;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .output-box {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            background-color: #fff;
            border: 2px dashed #e74c3c;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        label {
            font-weight: bold;
            color: #34495e;
            display: block;
            margin-bottom: 8px;
        }
        .status {
            font-style: italic;
            color: #7f8c8d;
            text-align: center;
            margin-top: -15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>Le "Massacreur" de Texte par IA</h1>
    <p class="subtitle">Propulsé de manière sécurisée par Mistral AI & Netlify</p>

    <div class="container">
        <div class="block">
            <label for="inputText">Texte d'origine (parfaitement écrit) :</label>
            <textarea id="inputText" placeholder="Colle ton texte impeccable ici..."></textarea>
        </div>

        <button id="submitBtn">Massacrer le texte avec l'IA</button>
        <div id="statusMessage" class="status"></div>

        <div class="block">
            <label>Texte transformé (bourré de fautes) :</label>
            <div id="outputText" class="output-box">Le résultat apparaîtra ici...</div>
        </div>
    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        submitBtn.addEventListener('click', async () => {
            const textToTransform = inputText.value.trim();

            if (!textToTransform) {
                alert("Erreur : Ajoute d'abord du texte à modifier.");
                return;
            }

            submitBtn.disabled = true;
            statusMessage.innerText = "L'IA de Mistral bousille ton texte en toute sécurité...";
            outputText.innerText = "Chargement...";

            try {
                // On appelle la fonction de l'API Netlify (sans lui montrer de clé)
                const response = await fetch('/api/transform', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: textToTransform })
                });

                if (!response.ok) {
                    throw new Error(`Erreur serveur (${response.status})`);
                }

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                outputText.innerText = data.result;
                statusMessage.innerText = "Traitement réussi !";

            } catch (error) {
                console.error(error);
                outputText.innerText = "Une erreur est survenue...";
                statusMessage.innerText = `Erreur : ${error.message}`;
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
